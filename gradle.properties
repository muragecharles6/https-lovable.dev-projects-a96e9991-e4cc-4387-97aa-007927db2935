# Gradle Properties

# The JVM arguments to use when running Gradle
org.gradle.jvmargs=-Xmx2048m

# Enables and configures the Gradle build cache
org.gradle.caching=true

# The number of worker threads to use for building
org.gradle.workers.max=4

# Default dependency resolution strategy
# Disable caching to always resolve dependencies from the repositories
org.gradle.caching.untracked=true
